name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --save-dev html-minifier terser clean-css-cli

      - name: Create deployment directory
        run: mkdir -p dist

      - name: Copy and minify files
        run: |
          #!/bin/bash
          set -e
          
          # Blacklisted directories and files
          BLACKLIST=(
            "README.md"
            ".github"
            ".gitignore"
            "wordle"
            "math"
            "tkinter_calculator.py"
            "node_modules"
            ".git"
          )
          
          # Function to check if file should be skipped
          is_blacklisted() {
            local file="$1"
            for pattern in "${BLACKLIST[@]}"; do
              # Check if pattern matches anywhere in the path
              if [[ "$file" == *"$pattern"* ]]; then
                return 0
              fi
            done
            return 1
          }
          
          # Function to minify HTML
          minify_html() {
            npx html-minifier --collapse-whitespace --remove-comments --remove-optional-tags "$1" > "$2"
          }
          
          # Function to minify CSS
          minify_css() {
            npx cleancss -o "$2" "$1"
          }
          
          # Function to minify JavaScript
          minify_js() {
            npx terser "$1" --compress --mangle -o "$2"
          }
          
          # Process all files
          while IFS= read -r -d '' file; do
            # Skip if blacklisted
            if is_blacklisted "$file"; then
              echo "⊘ Skipping: $file"
              continue
            fi
            
            # Determine destination path
            dest_file="dist/${file#./}"
            mkdir -p "$(dirname "$dest_file")"
            
            # Minify based on file type
            case "$file" in
              *.html)
                echo "Minifying HTML: $file"
                minify_html "$file" "$dest_file" || cp "$file" "$dest_file"
                echo '<!--Easter Egg:44 6F 20 79 6F 75 20 77 61 6E 74 20 74 6F 20 73 65 65 20 61 6E 20 45 61 73 74 65 72 20 45 67 67 3F 20 47 6F 20 74 6F 20 74 68 69 73 20 61 64 64 72 65 73 73 21 0A 68 74 74 70 73 3A 2F 2F 70 61 64 2E 72 69 73 65 75 70 2E 6E 65 74 2F 70 2F 53 61 76 65 2D 4C 61 74 65 2D 53 74 61 72 74 0A 44 69 67 20 64 65 65 70 2C 20 61 6E 64 20 79 6F 75 20 77 69 6C 6C 20 66 69 6E 64 20 66 75 6C 6C 20 69 6E 66 6F 72 6D 61 74 69 6F 6E 20 61 62 6F 75 74 20 74 68 65 20 63 72 65 61 74 6F 72 20 6F 66 20 74 68 69 73 20 65 6E 74 69 72 65 20 70 72 6F 6A 65 63 74 21-->' >> $dest_file
                ;;
              *.css)
                echo "Minifying CSS: $file"
                minify_css "$file" "$dest_file" || cp "$file" "$dest_file"
                ;;
              *.js)
                echo "Minifying JS: $file"
                minify_js "$file" "$dest_file" || cp "$file" "$dest_file"
                ;;
              *)
                echo "Copying: $file"
                cp "$file" "$dest_file"
                ;;
            esac
          done < <(find . -type f ! -path './dist/*' ! -path './.git/*' ! -path './node_modules/*' -print0)
          
          echo ""
          echo "Build complete!"
          du -sh dist/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
